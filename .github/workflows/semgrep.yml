name: Semgrep

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: SAST scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Semgrep
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/src" \
            -w /src \
            semgrep/semgrep:1.145.0 \
            semgrep scan \
              --config p/owasp-top-ten \
              --config p/javascript \
              --config p/typescript \
              --config p/react \
              --error \
              --sarif \
              --output semgrep-results.sarif \
              .

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-results.sarif
