name: Vercel Production Deploy

on:
  workflow_run:
    workflows:
      - Dragg CI
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  checks: read

concurrency:
  group: vercel-production-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy after checks pass
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Wait for CodeQL checks
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          deadline=$((SECONDS + 600))

          while true; do
            checks_json="$(
              gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/check-runs" --paginate |
                jq -s '[.[].check_runs[] | select(.name | startswith("CodeQL / "))]'
            )"

            total="$(jq 'length' <<< "${checks_json}")"
            pending="$(jq '[.[] | select(.status != "completed")] | length' <<< "${checks_json}")"
            failed="$(jq '[.[] | select(.status == "completed" and (.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral"))] | length' <<< "${checks_json}")"

            if [ "${failed}" -gt 0 ]; then
              jq -r '.[] | select(.status == "completed" and (.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")) | "- \(.name): \(.conclusion)"' <<< "${checks_json}"
              exit 1
            fi

            if [ "${total}" -gt 0 ] && [ "${pending}" -eq 0 ]; then
              echo "CodeQL checks completed successfully."
              break
            fi

            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "Timed out waiting for CodeQL checks to complete."
              exit 1
            fi

            echo "Waiting for CodeQL checks for ${HEAD_SHA}..."
            sleep 15
          done

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
